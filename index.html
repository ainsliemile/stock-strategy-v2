<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>波段與動能數據透視面板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
          const [inputs, setInputs] = useState(Array(110).fill(""));
          const [default100, setDefault100] = useState([]);
          const [results, setResults] = useState([]);
          const [isLoading, setIsLoading] = useState(false);
          const [fetchStatus, setFetchStatus] = useState("正在與 Papa Bear 系統連線...");

          useEffect(() => {
            fetchTopMomentum();
          }, []);

          const fetchTopMomentum = async () => {
              try {
                const response = await fetch(`https://ainsliemile.github.io/papa-bear-dashboard/momentum_history.json?t=${new Date().getTime()}`);
                const data = await response.json();
                let all = [];
                if (data.current_all) {
                  for (const cat in data.current_all) all = all.concat(data.current_all[cat]);
                }
                all.sort((a, b) => b.momentum - a.momentum);
                const top100 = all.slice(0, 100).map(item => item.symbol);
                setDefault100(top100);
                loadDefault(top100);
                setFetchStatus(`✅ 成功載入本週強勢股 (最新更新: ${data.update_time})`);
              } catch (error) {
                setFetchStatus("⚠️ 無法載入預設名單。");
              }
          };

          // 載入預設清單
          const loadDefault = (list = default100) => {
            const newInputs = [...list, ...Array(110 - list.length).fill("")];
            setInputs(newInputs);
          };

          // 🌟 新增：一鍵清空所有欄位功能
          const handleClearAll = () => {
            setInputs(Array(110).fill(""));
            // 可選：清空時也可以順便把下方的掃描結果收起來
            // setResults([]); 
          };

          const handleExecute = async () => {
            setIsLoading(true);
            setResults([]);
            const active = inputs.filter(s => s !== "");
            
            if (active.length === 0) {
              alert("請至少輸入一檔標的代碼！");
              setIsLoading(false);
              return;
            }

            try {
              const response = await fetch('https://my-stock-api-v2.onrender.com/api/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ symbols: active }),
              });
              
              if (!response.ok) throw new Error("伺服器連線異常");
              
              const data = await response.json();
              setResults(data);
            } catch (error) {
              alert("❌ 連線失敗，請確認您的 Render 雲端伺服器是否正常運作！");
            } finally {
              setIsLoading(false);
            }
          };

          return (
            <div className="min-h-screen bg-slate-900 text-slate-100 p-3 md:p-6">
              <div className="max-w-7xl mx-auto">
                <header className="mb-6 border-b border-slate-700 pb-4">
                  <h1 className="text-2xl font-bold text-white flex items-center gap-3">
                    <span className="text-yellow-400">🐻</span> 全自動百大動能 + 數據透視面板
                  </h1>
                </header>

                <section className="bg-slate-800 rounded-xl p-4 md:p-6 mb-8 border border-slate-700">
                  <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-4 gap-4">
                    <div>
                      <h2 className="text-lg font-semibold text-blue-300">股票輸入區 (110格)</h2>
                      <p className="text-sm text-slate-400 mt-1">{fetchStatus}</p>
                    </div>
                    {/* 調整按鈕區塊排版以容納三個按鈕 */}
                    <div className="flex flex-wrap gap-2 w-full lg:w-auto">
                      <button onClick={handleClearAll} className="flex-1 lg:flex-none px-4 py-2 bg-red-900/40 hover:bg-red-800/60 text-red-300 border border-red-700/50 rounded-lg text-sm font-bold transition-colors">
                        🗑️ 清空全部
                      </button>
                      <button onClick={() => loadDefault()} className="flex-1 lg:flex-none px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-sm font-bold transition-colors">
                        🔄 載入預設 100 檔
                      </button>
                      <button onClick={handleExecute} disabled={isLoading} className="w-full lg:w-auto px-6 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg font-bold transition-colors shadow-[0_0_15px_rgba(37,99,235,0.4)]">
                        {isLoading ? "運算中..." : "開始掃描"}
                      </button>
                    </div>
                  </div>
                  
                  <div className="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-7 gap-2 h-64 overflow-y-auto pr-2 custom-scrollbar">
                    {inputs.map((val, idx) => (
                      <input key={idx} type="text" value={val} onChange={(e) => {
                        const n = [...inputs]; n[idx] = e.target.value.toUpperCase().trim(); setInputs(n);
                      }} className="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm text-white uppercase focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder={`${idx + 1}.`}/>
                    ))}
                  </div>
                </section>

                {results.length > 0 && (
                  <section className="bg-slate-800 rounded-xl p-4 border border-slate-700 overflow-hidden shadow-2xl">
                    <div className="overflow-x-auto h-[600px] overflow-y-auto custom-scrollbar">
                      <table className="min-w-full text-left">
                        <thead className="sticky top-0 bg-slate-900 z-20">
                          <tr className="border-y border-slate-600 text-xs">
                            <th className="p-3 sticky left-0 bg-slate-900">代碼</th>
                            <th className="p-3 text-yellow-300">動能排名</th>
                            <th className="p-3 text-blue-300">買進建倉</th>
                            <th className="p-3 text-green-300">賣出訊號</th>
                            <th className="p-3 text-orange-200">買進指標數據 (月K/KD/乖離/週背離)</th>
                            <th className="p-3 text-teal-200">賣出指標數據 (週MACD)</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-700/50">
                          {results.map((res, i) => (
                            <tr key={i} className="hover:bg-slate-750 text-sm">
                              <td className="p-3 font-bold sticky left-0 bg-slate-800">{res.symbol}</td>
                              <td className="p-3">
                                <span className="px-2 py-0.5 rounded-full bg-slate-700 text-xs">{res.momentum_rank} ({res.momentum_score_str})</span>
                              </td>
                              <td className="p-3">
                                <span className={`px-2 py-1 rounded font-bold text-xs ${
                                  res.buy_signal === '右側重壓(50%)' ? 'bg-red-500/20 text-red-400 border border-red-500/50' : 
                                  res.buy_signal === '底部加碼(30%)' ? 'bg-pink-500/20 text-pink-400 border border-pink-500/50' : 
                                  res.buy_signal === '左側建倉(20%)' ? 'bg-orange-500/20 text-orange-400 border border-orange-500/50' : 
                                  'text-slate-400'
                                }`}>
                                  {res.buy_signal}
                                </span>
                              </td>
                              <td className="p-3 font-bold text-xs">
                                <span className={`px-2 py-1 rounded font-bold text-xs ${
                                  res.sell_signal === '全數賣出' ? 'bg-green-500/20 text-green-400 border border-green-500/50' : 
                                  res.sell_signal === '減碼50%' ? 'bg-teal-500/20 text-teal-400 border border-teal-500/50' : 
                                  'text-slate-400'
                                }`}>
                                  {res.sell_signal}
                                </span>
                              </td>
                              <td className="p-3 text-xs text-slate-300">
                                月K: <span className={res.monthly_k < 30 ? "text-red-400 font-bold" : ""}>{res.monthly_k}</span> | 
                                KD: <span className={res.monthly_kd_cross === 'GOLDEN' ? "text-red-400 font-bold" : res.monthly_kd_cross === 'DEATH' ? "text-green-400 font-bold" : ""}>{res.monthly_kd_cross === 'GOLDEN' ? '金叉' : res.monthly_kd_cross === 'DEATH' ? '死叉' : '-'}</span> | 
                                乖離: <span className={res.bias_val < -15 ? "text-red-400 font-bold" : ""}>{res.bias_val}%</span> | 
                                週背離: <span className={res.weekly_divergence ? "text-pink-400 font-bold" : ""}>{res.weekly_divergence ? 'YES' : '-'}</span>
                              </td>
                              <td className="p-3 text-xs text-slate-300">
                                週MACD: <span className={res.weekly_macd_cross === 'GOLDEN' ? "text-red-400 font-bold" : res.weekly_macd_cross === 'DEATH' ? "text-green-400 font-bold" : ""}>{res.weekly_macd_cross === 'GOLDEN' ? '金叉' : res.weekly_macd_cross === 'DEATH' ? '死叉' : '-'}</span>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </section>
                )}
              </div>
              <style>{`.custom-scrollbar::-webkit-scrollbar { width: 6px; } .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }`}</style>
            </div>
          );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
