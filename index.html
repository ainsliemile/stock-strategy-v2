<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>波段與動能雙重策略面板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
          const [inputs, setInputs] = useState(Array(110).fill(""));
          const [results, setResults] = useState([]);
          const [isLoading, setIsLoading] = useState(false);
          const [lastUpdateTime, setLastUpdateTime] = useState(null);
          const [fetchStatus, setFetchStatus] = useState("正在與 Papa Bear 系統連線，抓取本週最強 100 檔標的...");

          useEffect(() => {
            const fetchTopMomentum = async () => {
              try {
                const timestamp = new Date().getTime();
                const response = await fetch(`https://ainsliemile.github.io/papa-bear-dashboard/momentum_history.json?t=${timestamp}`);
                const data = await response.json();
                
                let allTickers = [];
                if (data.current_all) {
                  for (const category in data.current_all) {
                    allTickers = allTickers.concat(data.current_all[category]);
                  }
                }
                
                allTickers.sort((a, b) => b.momentum - a.momentum);
                const top100Symbols = allTickers.slice(0, 100).map(item => item.symbol);
                const newInputs = [...top100Symbols, ...Array(110 - top100Symbols.length).fill("")];
                
                setInputs(newInputs);
                setFetchStatus(`✅ 成功載入本週全市場動能前 100 名標的 (最新更新: ${data.update_time})`);
              } catch (error) {
                console.error("無法載入動能資料:", error);
                setFetchStatus("⚠️ 無法連線至 Papa Bear 系統，請先手動輸入標的。");
              }
            };
            
            fetchTopMomentum();
          }, []);

          const handleInputChange = (index, value) => {
            const newInputs = [...inputs];
            newInputs[index] = value.toUpperCase().trim();
            setInputs(newInputs);
          };

          const handleExecute = async () => {
            setIsLoading(true);
            setResults([]);
            const activeSymbols = inputs.filter(symbol => symbol !== "");

            if (activeSymbols.length === 0) {
              setIsLoading(false);
              return;
            }

            try {
              // 連線至您的 Render 後端 API
              const response = await fetch('https://my-stock-api-v2.onrender.com/api/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ symbols: activeSymbols }),
              });

              if (!response.ok) throw new Error("伺服器連線異常");

              const data = await response.json();
              setResults(data.map((item, index) => ({ ...item, id: index })));
              setLastUpdateTime(new Date().toLocaleTimeString());
            } catch (error) {
              alert("❌ 連線失敗，請確認您的 Render 雲端伺服器是否處於正常運作狀態！");
            } finally {
              setIsLoading(false);
            }
          };

          // 嚴格三階段買進訊號顏色判定
          const getBuyBadgeStyle = (signal) => {
            if (signal === "右側重壓(50%)") {
              return "bg-red-500/30 text-red-300 border-red-500 shadow-[0_0_10px_rgba(239,68,68,0.3)]";
            } else if (signal === "底部加碼(30%)") {
              return "bg-pink-500/30 text-pink-300 border-pink-500";
            } else if (signal === "左側建倉(20%)") {
              return "bg-orange-500/30 text-orange-300 border-orange-500";
            }
            return "bg-slate-700 text-slate-400 border-slate-600 font-normal";
          };

          return (
            <>
              <div className="min-h-screen bg-slate-900 text-slate-100 p-3 md:p-6 font-sans">
                <div className="max-w-7xl mx-auto">
                  <header className="mb-6 border-b border-slate-700 pb-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <h1 className="text-2xl md:text-3xl font-bold text-white flex items-center gap-3">
                      <span className="text-yellow-400">🐻</span> 全自動百大動能 + 嚴格波段狙擊面板
                    </h1>
                  </header>

                  {/* 策略公式說明區塊 */}
                  <div className="bg-slate-800 rounded-xl p-4 shadow-xl mb-6 border border-slate-700 text-sm text-slate-300">
                    <p className="mb-2"><span className="text-yellow-400 font-bold">💡 動能公式說明：</span> 動能排名依據標的之 <strong>(1個月 + 3個月 + 6個月) 總報酬率平均值</strong> 排序。數值 &gt; 0 才排名，&lt; 0 則「不投資」。</p>
                    <p><span className="text-blue-400 font-bold">🛡️ 三階段智慧建倉系統：</span> 結合乖離率、週底背離與價量突破，過濾低檔鈍化風險，精準劃分【左側 20%】、【底部 30%】、【右側 50%】資金配比。</p>
                  </div>

                  <section className="bg-slate-800 rounded-xl p-4 md:p-6 shadow-xl mb-8 border border-slate-700">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4">
                      <div>
                        <h2 className="text-lg font-semibold text-blue-300">系統自動匯入名單 (100檔強勢股 + 10格自訂區)</h2>
                        <p className="text-sm text-slate-400 mt-1">{fetchStatus}</p>
                      </div>
                      <button
                        onClick={handleExecute}
                        disabled={isLoading}
                        className={`w-full md:w-auto px-6 py-3 rounded-lg font-bold transition-all ${
                          isLoading ? "bg-slate-600 text-slate-400 cursor-not-allowed" : "bg-blue-600 hover:bg-blue-500 text-white shadow-[0_0_15px_rgba(37,99,235,0.4)]"
                        }`}
                      >
                        {isLoading ? "雲端伺服器運算中..." : "開始執行 110 檔策略掃描"}
                      </button>
                    </div>
                    
                    <div className="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-7 gap-2 h-72 md:h-80 overflow-y-auto pr-2 custom-scrollbar">
                      {inputs.map((val, idx) => (
                        <input key={idx} type="text" value={val}
                          onChange={(e) => handleInputChange(idx, e.target.value)}
                          placeholder={`${idx + 1}. ${idx < 100 ? '動能強勢股' : '自訂備用格'}`}
                          className={`w-full bg-slate-900 border ${idx < 100 ? 'border-blue-900/60' : 'border-slate-600 border-dashed'} rounded p-2 text-sm text-white focus:outline-none focus:border-blue-500 uppercase`}
                        />
                      ))}
                    </div>
                  </section>

                  {results.length > 0 && (
                    <section className="bg-slate-800 rounded-xl p-4 shadow-xl border border-slate-700 overflow-hidden">
                      <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-3">
                        <div>
                          <h2 className="text-lg font-semibold text-blue-300 flex items-center gap-2">
                            掃描結果 (已自動依據動能排序)
                          </h2>
                          <span className="text-xs text-slate-400">運算完成: {lastUpdateTime}</span>
                        </div>
                      </div>
                      
                      <div className="overflow-x-auto -mx-4 md:mx-0 px-4 md:px-0 h-[600px] overflow-y-auto custom-scrollbar">
                        <table className="min-w-full text-left border-collapse">
                          <thead className="sticky top-0 bg-slate-900 z-20 shadow-md">
                            <tr className="border-y border-slate-600">
                              <th className="p-3 font-semibold text-slate-200 sticky left-0 bg-slate-900 z-30">標的代碼</th>
                              <th className="p-3 font-semibold text-yellow-300 text-sm whitespace-nowrap">動能排名</th>
                              <th className="p-3 font-semibold text-slate-300 text-sm whitespace-nowrap">動能均值(1/3/6月)</th>
                              <th className="p-3 font-semibold text-slate-200">買進建倉階段</th>
                              <th className="p-3 font-semibold text-slate-200">賣出訊號</th>
                              <th className="p-3 font-semibold text-slate-200 text-xs">底層數據</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-700/70">
                            {results.map((res) => {
                              let rankBadge = "bg-blue-900/40 text-blue-300 border-blue-800";
                              if (res.momentum_rank === "第 1 名") rankBadge = "bg-yellow-500/30 text-yellow-400 border-yellow-500 font-bold shadow-[0_0_10px_rgba(234,179,8,0.3)]";
                              else if (res.momentum_rank === "第 2 名") rankBadge = "bg-slate-300/30 text-slate-200 border-slate-400 font-bold";
                              else if (res.momentum_rank === "第 3 名") rankBadge = "bg-orange-700/40 text-orange-300 border-orange-700 font-bold";
                              else if (res.momentum_rank === "不投資") rankBadge = "bg-slate-700 text-slate-400 border-slate-600 line-through";
                              else if (res.momentum_rank === "資料不足") rankBadge = "bg-slate-800 text-slate-500 border-slate-700";

                              return (
                                <tr key={res.id} className="hover:bg-slate-750">
                                  <td className="p-3 font-bold text-white whitespace-nowrap sticky left-0 bg-slate-800 z-10">{res.symbol}</td>
                                  
                                  <td className="p-3 whitespace-nowrap">
                                    <span className={`px-3 py-1 rounded-full text-xs md:text-sm border ${rankBadge}`}>
                                      {res.momentum_rank}
                                    </span>
                                  </td>

                                  <td className={`p-3 whitespace-nowrap font-mono text-sm ${res.momentum_score < 0 ? 'text-red-400' : 'text-green-400'}`}>
                                    {res.momentum_score_str}
                                  </td>
                                  
                                  <td className="p-3 whitespace-nowrap">
                                    <span className={`px-3 py-1 rounded-full text-sm font-bold border ${getBuyBadgeStyle(res.buy_signal)}`}>
                                      {res.buy_signal}
                                    </span>
                                  </td>

                                  <td className="p-3 whitespace-nowrap">
                                    <span className={`px-3 py-1 rounded-full text-sm font-bold border ${
                                      res.sell_signal === "全數賣出" ? "bg-green-500/30 text-green-300 border-green-500" :
                                      res.sell_signal === "減碼50%" ? "bg-teal-500/20 text-teal-300 border-teal-500" :
                                      "bg-slate-700 text-slate-400 border-slate-600 font-normal"
                                    }`}>
                                      {res.sell_signal}
                                    </span>
                                  </td>

                                  <td className="p-3 whitespace-nowrap text-xs text-slate-400">
                                    <div>月K: <span className={res.monthly_k < 30 ? "text-red-300 font-bold" : "text-white"}>{res.monthly_k}</span> | KD: {res.monthly_kd_cross === "GOLDEN" ? <span className="text-red-300">金叉</span> : res.monthly_kd_cross === "DEATH" ? <span className="text-green-300">死叉</span> : "-"}</div>
                                    <div className="mt-1">週MACD: {res.weekly_macd_cross === "DEATH" ? <span className="text-green-300">死叉</span> : res.weekly_macd_cross === "GOLDEN" ? <span className="text-red-300">金叉</span> : "-"}</div>
                                  </td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                    </section>
                  )}

                  <footer className="mt-8 mb-4 bg-slate-800 rounded-xl p-6 border border-slate-700 text-sm text-slate-400 leading-relaxed shadow-xl">
                    <h4 className="text-blue-300 font-bold mb-3 text-base flex items-center gap-2">
                      <span className="text-lg">⚠️</span> 雲端平台免費方案保活指南 (必讀)
                    </h4>
                    <ul className="list-disc pl-5 space-y-2">
                      <li><strong>Render (後端伺服器)：</strong> 超過 15 分鐘無人使用會自動休眠。<span className="text-slate-200">無須定期登入後台</span>，只需在打開網頁時耐心等待 1~2 分鐘讓伺服器喚醒即可。</li>
                      <li><strong>GitHub Actions (百大名單自動更新)：</strong> 官方規定若專案庫 <span className="text-red-300 font-bold">連續 60 天無任何活動</span>，會自動暫停排程。<span className="text-slate-200">強烈建議您每 1.5 個月 (約 45 天) 登入 GitHub 一次</span>，隨意修改一下 README.md 檔案的文字並儲存，以保持帳號活躍。</li>
                    </ul>
                  </footer>

                </div>
              </div>
              <style>
                {`
                  .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
                  .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px; }
                  .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }
                  .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #60a5fa; }
                `}
              </style>
            </>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
